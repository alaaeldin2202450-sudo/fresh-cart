<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FreshCart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-leaf"></i> Fresh<span>Cart</span>
            </a>
            
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="contact.html">Contact</a>
                <a href="login.html" class="active">Login</a>
            </div>
            
            <div class="nav-icons" style="display: none;"></div>
        </div>
    </nav>

    <main class="container section">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to your account to continue</p>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-input-group">
                        <input type="password" id="password" class="form-control" placeholder="••••••••">
                        <span class="password-toggle" id="toggle-password">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>

                <div style="text-align: right; margin-bottom: 24px;">
                    <a href="#" style="color: var(--primary); font-size: 14px;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" style="padding: 14px;">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
    </main>

    <script src="../js/validation.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
