<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FreshCart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-leaf"></i> Fresh<span>Cart</span>
            </a>
            
            <div class="nav-links">
                <a href="../index.html">Home</a>
            </div>
            
            <div class="nav-icons" style="display: none;">
                <!-- Hide elements safely so ui.js doesn't crash if they exist in DOM structure expectations usually, though we handle it safely anyway -->
            </div>
        </div>
    </nav>

    <main class="container section">
        <div class="section-header">
            <h1>Checkout</h1>
        </div>

        <div class="checkout-container">
            <div class="checkout-form-container">
                <h2>Billing Details</h2>
                <form id="checkout-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="John Doe">
                    </div>

                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                        <div class="form-group">
                            <label class="form-label" for="email">Email</label>
                            <input type="email" id="email" class="form-control" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="phone">Phone (Egyptian format)</label>
                            <input type="text" id="phone" class="form-control" placeholder="01012345678">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="address">Shipping Address</label>
                        <textarea id="address" class="form-control" rows="3" placeholder="123 Main St, City, Country"></textarea>
                    </div>

                    <h2 style="margin-top: 32px;">Payment Method</h2>
                    <div class="payment-methods">
                        <label class="payment-method">
                            <input type="radio" name="payment" value="credit">
                            <div class="method-content">
                                <i class="fas fa-credit-card"></i>
                                <span>Credit Card</span>
                            </div>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="paypal">
                            <div class="method-content">
                                <i class="fab fa-paypal"></i>
                                <span>PayPal</span>
                            </div>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="cod">
                            <div class="method-content">
                                <i class="fas fa-money-bill-wave"></i>
                                <span>Cash on Delivery</span>
                            </div>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="padding: 16px; font-size: 18px;">Place Order</button>
                </form>
            </div>

            <div class="checkout-summary">
                <h2 style="font-size: 20px; margin-bottom: 24px;">Order Summary</h2>
                <div id="checkout-items" style="margin-bottom: 24px;">
                    <!-- Items snippet -->
                </div>
                
                <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-bottom: 8px; display: flex; justify-content: space-between;">
                    <span>Subtotal</span>
                    <span id="checkout-total">$0.00</span>
                </div>
                <div style="margin-bottom: 16px; display: flex; justify-content: space-between; color: var(--gray);">
                    <span>Shipping</span>
                    <span id="checkout-shipping">Free</span>
                </div>
                <div style="border-top: 1px solid var(--border); padding-top: 16px; display: flex; justify-content: space-between; font-weight: bold; font-size: 20px;">
                    <span>Total</span>
                    <span id="checkout-final-total">$0.00</span>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/products.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/validation.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
