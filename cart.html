<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - FreshCart</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-leaf"></i> Fresh<span>Cart</span>
            </a>
            
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="contact.html">Contact</a>
                <a href="login.html">Login</a>
            </div>

            <div class="nav-icons">
                <div id="theme-toggle"><i class="fas fa-moon"></i></div>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge">0</span>
                </a>
                <div class="hamburger">
                    <i class="fas fa-bars"></i>
                </div>
            </div>
        </div>
    </nav>

    <main class="container section">
        <div class="section-header">
            <h1>Shopping Cart</h1>
            <p>Review your items before checkout</p>
        </div>

        <div class="cart-container">
            <div>
                <div id="cart-items" class="cart-items-list">
                    <!-- Cart items injected by JS -->
                </div>
                <div class="text-right">
                    <button id="clear-cart-btn" class="btn btn-outline" style="margin-top: 24px;">
                        <i class="fas fa-trash-alt"></i> Clear Cart
                    </button>
                </div>
            </div>

            <div id="cart-summary" class="cart-summary" style="display: none;">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span id="cart-shipping">$0.00</span>
                </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <a href="checkout.html" class="btn btn-primary btn-block">
                    Proceed to Checkout <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container text-center" style="padding: 24px 0; color: var(--gray);">
            <p>&copy; 2026 FreshCart. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/products.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
</body>
</html>
